<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Collaborative Whiteboard</title>
  <link rel="stylesheet" href="style.css">
  <!-- Load Socket.io via CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header class="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="rectangle" title="Rectangle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        </button>
        <button class="tool-btn" data-tool="select" title="Select / Move">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7 18 3-7 7-3L3 3z"/></svg>
        </button>
      </div>

      <div class="divider"></div>

      <div class="tool-group">
        <div class="color-picker-wrapper">
          <label for="stroke-color">Stroke</label>
          <input type="color" id="stroke-color" value="#000000">
        </div>
        <div class="color-picker-wrapper">
          <label for="fill-color">Fill</label>
          <input type="color" id="fill-color" value="#ffffff">
        </div>
        <div class="select-wrapper">
          <label for="stroke-width">Size</label>
          <select id="stroke-width">
            <option value="1">Thin (1px)</option>
            <option value="2" selected>Medium (2px)</option>
            <option value="4">Thick (4px)</option>
            <option value="8">Bold (8px)</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="tool-group">
        <button id="btn-clear" class="action-btn danger">Clear All</button>
      </div>

      <div class="room-info">
        <span id="room-display">Room: ...</span>
      </div>
    </header>

    <div class="workspace">
      <main class="canvas-container">
        <canvas id="canvas"></canvas>
      </main>

      <aside class="sidebar">
        <h3>Connected Users</h3>
        <ul id="user-list"></ul>
      </aside>
    </div>
  </div>

  <!-- <script type="module" src="app.js"></script> -->
</body>
</html>
